<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familiemøte — Referater</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:      #2563EB;
      --primary-bg:   #EFF6FF;
      --accent:       #F59E0B;
      --accent-bg:    #FEF3C7;
      --bg:           #F8FAFC;
      --card:         #FFFFFF;
      --text:         #0F172A;
      --muted:        #64748B;
      --border:       #E2E8F0;
      --success:      #059669;
      --success-bg:   #D1FAE5;
      --danger:       #DC2626;
      --danger-bg:    #FEE2E2;
      --blue-bg:      #DBEAFE;
      --grey-bg:      #F1F5F9;
      --r:            12px;
      --rs:           8px;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.08);
      --shadow:       0 4px 12px rgba(0,0,0,.1);
      --shadow-lg:    0 10px 25px rgba(0,0,0,.12);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; font-size: 16px; line-height: 1.6;
    }

    .screen { display: none; }
    .screen.active { display: block; }
    #login-screen {
      display: none; align-items: center; justify-content: center; min-height: 100vh;
      padding: 1rem; background: linear-gradient(135deg, #3B82F6 0%, #6366F1 100%);
    }
    #login-screen.active { display: flex; }

    #loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(255,255,255,.8);
      z-index: 900; align-items: center; justify-content: center;
    }
    #loading-overlay.on { display: flex; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed; bottom: 5rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1E293B; color: #fff; padding: .65rem 1.4rem;
      border-radius: 30px; font-size: .875rem; font-weight: 500;
      opacity: 0; transition: all .3s; pointer-events: none;
      white-space: nowrap; z-index: 950;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.ok  { background: var(--success); }
    #toast.err { background: var(--danger); }

    .login-card {
      background: var(--card); border-radius: var(--r); padding: 2.5rem 2rem;
      width: 100%; max-width: 360px; box-shadow: var(--shadow-lg); text-align: center;
    }
    .login-logo  { font-size: 4rem; margin-bottom: .4rem; }
    .login-title { font-size: 1.5rem; font-weight: 700; margin-bottom: .2rem; }
    .login-sub   { color: var(--muted); font-size: .875rem; margin-bottom: 1.75rem; }
    .login-err   { color: var(--danger); font-size: .8rem; margin-top: .35rem; display: none; }
    .login-err.on { display: block; }

    .app-header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 1rem; display: flex; align-items: center; height: 58px;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
    }
    .hdr-title { flex: 1; font-size: 1.05rem; font-weight: 700; color: var(--primary); }
    .hdr-actions { display: flex; gap: .4rem; align-items: center; }

    .main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .35rem;
      padding: .6rem 1.2rem; border-radius: var(--rs); font-size: .875rem;
      font-weight: 600; cursor: pointer; border: none; transition: all .15s;
      white-space: nowrap; font-family: inherit;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #1D4ED8; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn-sec   { background: var(--card); color: var(--text); border: 1.5px solid var(--border); }
    .btn-sec:hover { background: var(--bg); }
    .btn-ghost { background: transparent; color: var(--muted); padding: .45rem .7rem; }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: .35rem .7rem; font-size: .78rem; }
    .btn-lg { padding: .875rem 1.5rem; font-size: 1rem; width: 100%; }
    .btn-icon { padding: .45rem; width: 36px; height: 36px; border-radius: 50%; }

    .fg { margin-bottom: 1.125rem; }
    label { display: block; font-size: .825rem; font-weight: 600; margin-bottom: .35rem; }
    input[type=text], input[type=date], input[type=password], textarea, select {
      width: 100%; padding: .6rem .875rem; border: 1.5px solid var(--border);
      border-radius: var(--rs); font-size: .9rem; font-family: inherit;
      color: var(--text); background: var(--card);
      transition: border-color .15s, box-shadow .15s; outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-bg);
    }
    textarea { resize: vertical; min-height: 72px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .cb-group { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .25rem; }
    .cb-chip {
      display: flex; align-items: center; gap: .35rem; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 20px; padding: .3rem .7rem;
      cursor: pointer; transition: all .15s; user-select: none; font-size: .85rem;
    }
    .cb-chip input { display: none; }
    .cb-chip.checked {
      background: var(--primary-bg); border-color: var(--primary);
      color: var(--primary); font-weight: 600;
    }
    .cb-section-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin: .5rem 0 .25rem;
    }

    .ag-form-item {
      background: var(--bg); border-radius: var(--rs); border: 1px solid var(--border);
      margin-bottom: .5rem; overflow: hidden;
    }
    .ag-form-item.dragging {
      opacity: .55;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-bg);
    }
    .ag-form-item.drag-over-top {
      box-shadow: inset 0 3px 0 var(--primary);
    }
    .ag-form-item.drag-over-bottom {
      box-shadow: inset 0 -3px 0 var(--primary);
    }
    .ag-form-row {
      display: flex; align-items: center; gap: .4rem; padding: .5rem .6rem;
    }
    .ag-drag {
      cursor: grab;
      user-select: none;
      font-size: 1rem;
      color: var(--muted);
      padding: .2rem .3rem;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .ag-drag:hover {
      background: var(--grey-bg);
      color: var(--text);
    }
    .ag-form-num {
      background: var(--primary); color: #fff; width: 22px; height: 22px;
      border-radius: 50%; font-size: .72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ag-form-row input {
      flex: 1; border: none; background: transparent; padding: .3rem .4rem;
      font-size: .9rem; outline: none;
    }
    .ag-form-row input:focus { background: white; border-radius: 4px; }
    .ag-notes-toggle {
      background: none; border: none; cursor: pointer; font-size: .75rem;
      color: var(--muted); padding: .2rem .4rem; transition: color .15s;
    }
    .ag-notes-toggle:hover { color: var(--primary); }
    .ag-notes-area { padding: 0 .6rem .5rem; display: none; }
    .ag-notes-area.open { display: block; }
    .ag-notes-area textarea { font-size: .825rem; min-height: 56px; background: var(--card); }

    .rm-btn {
      background: var(--danger-bg); color: var(--danger); border: none;
      border-radius: 50%; width: 26px; height: 26px; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .rm-btn:hover { background: var(--danger); color: #fff; }
    .add-btn {
      background: none; border: 1.5px dashed var(--border); border-radius: var(--rs);
      color: var(--muted); padding: .45rem 1rem; font-size: .825rem; cursor: pointer;
      width: 100%; transition: all .15s; font-family: inherit; margin-top: .25rem;
    }
    .add-btn:hover {
      border-color: var(--primary); color: var(--primary); background: var(--primary-bg);
    }

    .task-form-item {
      background: var(--bg); border-radius: var(--rs); border: 1px solid var(--border);
      padding: .65rem .75rem; margin-bottom: .5rem;
    }
    /* ===== Videreført badge stil ===== */
    .task-form-item.viderefort-item {
      border-color: var(--accent);
      background: #fffbeb;
    }
    .viderefort-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      background: var(--accent-bg); color: #92400E;
      border-radius: 20px; padding: .18rem .65rem;
      font-size: .72rem; font-weight: 700;
      margin-bottom: .45rem;
    }
    /* ================================= */
    .task-form-row1 { display: flex; align-items: center; gap: .4rem; margin-bottom: .4rem; }
    .task-form-row1 select { flex: 0 0 110px; }
    .task-form-row1 input[type=text] { flex: 1; }
    .task-form-row1 input[type=date] { flex: 0 0 130px; }
    .task-form-row2 { display: flex; align-items: center; gap: .4rem; }
    .task-form-row2 select { flex: 0 0 140px; }
    .task-form-row2 input { flex: 1; font-size: .825rem; }

    .pg-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .pg-hdr h2 { font-size: 1.25rem; }

    .r-card {
      background: var(--card); border-radius: var(--r); padding: 1.125rem 1.25rem;
      margin-bottom: .65rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border);
      cursor: pointer; transition: all .2s;
    }
    .r-card:hover { box-shadow: var(--shadow); border-color: var(--primary); transform: translateY(-2px); }
    .r-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; }
    .r-card-title { font-weight: 700; font-size: 1rem; margin-bottom: .2rem; }
    .r-card-meta  { font-size: .775rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: .5rem; }
    .date-badge {
      background: var(--primary-bg); color: var(--primary); font-size: .72rem;
      font-weight: 700; padding: .2rem .55rem; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty .icon { font-size: 2.75rem; margin-bottom: .75rem; }

    .fab {
      position: fixed; bottom: 1.5rem; right: 1.5rem; width: 54px; height: 54px;
      border-radius: 50%; background: var(--primary); color: #fff; border: none;
      font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 14px rgba(37,99,235,.5);
      display: flex; align-items: center; justify-content: center; transition: all .2s; z-index: 50;
    }
    .fab:hover { background: #1D4ED8; transform: scale(1.08); }

    .det-head {
      background: var(--card); border-radius: var(--r); padding: 1.25rem;
      border: 1px solid var(--border); margin-bottom: .85rem;
    }
    .det-konu { font-size: 1.25rem; font-weight: 700; margin-bottom: .35rem; }
    .det-meta  { font-size: .825rem; color: var(--muted); }

    .det-sec { margin-bottom: .85rem; }
    .det-sec-title {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted); margin-bottom: .5rem; padding-bottom: .3rem;
      border-bottom: 1px solid var(--border); font-weight: 700;
    }

    .chips { display: flex; flex-wrap: wrap; gap: .35rem; }
    .chip  {
      background: var(--primary-bg); color: var(--primary);
      border-radius: 20px; padding: .2rem .65rem; font-size: .82rem; font-weight: 500;
    }

    .acc-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rs); margin-bottom: .4rem; overflow: hidden;
    }
    .acc-trigger {
      display: flex; align-items: center; gap: .6rem; padding: .7rem .875rem;
      cursor: pointer; user-select: none; transition: background .15s; width: 100%;
      background: none; border: none; font-family: inherit; font-size: .9rem; text-align: left;
    }
    .acc-trigger:hover { background: var(--bg); }
    .acc-num {
      background: var(--primary); color: #fff; width: 22px; height: 22px;
      border-radius: 50%; font-size: .72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .acc-label { flex: 1; font-weight: 500; }
    .acc-arrow { font-size: .75rem; color: var(--muted); transition: transform .2s; }
    .acc-item.open .acc-arrow { transform: rotate(90deg); }
    .acc-body { display: none; padding: .75rem .875rem; border-top: 1px solid var(--border); background: var(--bg); }
    .acc-item.open .acc-body { display: block; }
    .acc-body p { font-size: .875rem; line-height: 1.7; white-space: pre-wrap; }
    .acc-no-notes { font-size: .825rem; color: var(--muted); font-style: italic; }

    .status-badge {
      display: inline-flex; align-items: center; gap: .3rem; border-radius: 20px;
      padding: .15rem .55rem; font-size: .75rem; font-weight: 700; white-space: nowrap;
    }
    .status-ikke_startet { background: var(--grey-bg); color: var(--muted); }
    .status-pagaar       { background: var(--blue-bg); color: #1D4ED8; }
    .status-fullfort     { background: var(--success-bg); color: var(--success); }
    .status-avbrutt      { background: var(--danger-bg); color: var(--danger); }

    .task-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rs); padding: .75rem .875rem; margin-bottom: .4rem;
    }
    .task-card.avbrutt .task-name { text-decoration: line-through; opacity: .6; }
    .task-card-row1 { display: flex; align-items: flex-start; gap: .6rem; margin-bottom: .3rem; }
    .task-who  {
      background: var(--accent-bg); color: #92400E;
      border-radius: 20px; padding: .15rem .55rem; font-size: .78rem;
      font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .task-name { flex: 1; font-size: .9rem; font-weight: 500; }
    .task-card-row2 { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .task-due  { font-size: .75rem; color: var(--muted); }
    .task-notes-text { font-size: .8rem; color: var(--muted); font-style: italic; margin-top: .25rem; }

    .task-edit-box {
      margin-top: .65rem;
      padding-top: .65rem;
      border-top: 1px dashed var(--border);
    }
    .task-edit-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
    }
    .task-edit-row select {
      flex: 1 1 180px;
      max-width: 220px;
    }

    .next-banner {
      background: linear-gradient(135deg, var(--accent-bg), #FDE68A);
      border-radius: var(--rs); padding: .75rem 1rem; display: flex;
      align-items: center; gap: .75rem; font-weight: 600; margin-bottom: .85rem;
    }
    .next-banner .ni { font-size: 1.5rem; }

    .comments-wrap { padding-top: 1rem; border-top: 2px solid var(--border); }
    .comments-wrap h2 { font-size: 1.05rem; margin-bottom: .75rem; }
    .com-item { background: var(--bg); border-radius: var(--rs); padding: .7rem .875rem; margin-bottom: .45rem; }
    .com-top { display: flex; align-items: center; gap: .5rem; margin-bottom: .25rem; }
    .com-author { font-weight: 700; font-size: .875rem; }
    .com-date { font-size: .75rem; color: var(--muted); margin-left: auto; }
    .com-text { font-size: .875rem; }
    .com-form {
      background: var(--card); border-radius: var(--r); padding: .875rem;
      border: 1px solid var(--border); margin-top: .75rem;
    }
    .com-form label { font-size: .8rem; }
    .com-row { display: flex; gap: .5rem; margin-top: .4rem; }
    .com-row select { flex: 0 0 130px; }
    .com-row textarea { flex: 1; min-height: 52px; }

    @media (max-width: 640px) {
      .grid2 { grid-template-columns: 1fr; }
      .main  { padding: 1rem .75rem 5rem; }
      .hdr-title { font-size: .92rem; }
      .app-header { padding: 0 .6rem; }
      .fab { bottom: 1rem; right: 1rem; width: 52px; height: 52px; }
      #toast { white-space: normal; max-width: calc(100vw - 2rem); text-align: center; }
      .btn:not(.btn-icon):not(.btn-sm) { min-height: 44px; }
      .acc-trigger { min-height: 48px; padding: .875rem; }
      .cb-chip { padding: .45rem .85rem; font-size: .9rem; }
      .rm-btn { width: 32px; height: 32px; }
      .add-btn { padding: .65rem 1rem; font-size: .875rem; }

      .task-form-row1 { flex-wrap: wrap; }
      .task-form-row1 select { flex: 1 1 auto; min-width: 0; }
      .task-form-row1 input[type=text] { flex: 1 1 100%; order: 3; }
      .task-form-row1 input[type=date] { flex: 1 1 100%; order: 4; }
      .task-form-row1 .rm-btn { order: 2; flex-shrink: 0; }

      .task-form-row2 { flex-direction: column; gap: .4rem; }
      .task-form-row2 select { flex: none; width: 100%; }
      .task-form-row2 input  { flex: none; }

      .com-row { flex-direction: column; }
      .com-row select { flex: none; }
      .ag-notes-area textarea { min-height: 64px; }
      .task-card-row1 { gap: .4rem; }
      .task-card-row2 { flex-wrap: wrap; gap: .35rem; }
      .r-card { padding: .875rem 1rem; }
      .r-card-title { font-size: .975rem; }

      .task-edit-row {
        flex-direction: column;
        align-items: stretch;
      }
      .task-edit-row select {
        max-width: none;
      }
    }
  </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>
<div id="toast"></div>

<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="login-logo">🏠</div>
    <h1 class="login-title">Familiemøte</h1>
    <p class="login-sub">Referater & Beslutninger</p>
    <div class="fg">
      <input type="password" id="pwd-input" placeholder="Familiepassord" autocomplete="current-password" />
      <div class="login-err" id="pwd-err">Feil passord, prøv igjen.</div>
    </div>
    <button class="btn btn-primary btn-lg" onclick="doLogin()">Logg inn</button>
  </div>
</div>

<div id="app-screen" class="screen">

  <header class="app-header">
    <button class="btn btn-ghost btn-icon" id="back-btn" onclick="goBack()" style="display:none">&#8592;</button>
    <div class="hdr-title" id="hdr-title">&#127968; Familiemøte</div>
    <div class="hdr-actions">
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logg ut</button>
    </div>
  </header>

  <div class="main">

    <div id="view-list">
      <div class="pg-hdr">
        <h2>Referater</h2>
        <span id="r-count" style="color:var(--muted);font-size:.825rem"></span>
      </div>
      <div id="r-list">
        <div class="empty"><div class="spinner" style="margin:0 auto"></div></div>
      </div>
    </div>

    <div id="view-new" style="display:none">
      <h2 style="margin-bottom:1.25rem">Nytt referat</h2>

      <div class="grid2">
        <div class="fg">
          <label>Tittel</label>
          <input type="text" id="f-konu" placeholder="Uke 14" />
        </div>
        <div class="fg">
          <label>Dato</label>
          <input type="date" id="f-tarih" />
        </div>
      </div>

      <div class="grid2">
        <div class="fg">
          <label>Opprettet av</label>
          <select id="f-olusturan"></select>
        </div>
      </div>

      <div class="fg">
        <label>Deltakere</label>
        <div class="cb-section-label">Fast</div>
        <div class="cb-group" id="f-std-deltakere"></div>
        <div class="cb-section-label" style="margin-top:.5rem">Ekstra</div>
        <div class="cb-group" id="f-ext-deltakere"></div>
      </div>

      <div class="fg">
        <label>Dagsorden</label>
        <div id="f-gundem-list"></div>
        <button class="add-btn" onclick="addGundem()">+ Legg til dagsordenspunkt</button>
      </div>

      <div class="fg">
        <label>Oppgavefordeling</label>
        <div id="f-gorev-list"></div>
        <button class="add-btn" onclick="addGorev()">+ Legg til oppgave</button>
      </div>

      <div class="fg">
        <label>Neste møte</label>
        <input type="date" id="f-sonraki" />
      </div>

      <div style="display:flex;flex-wrap:wrap;gap:.75rem;margin-top:.5rem">
        <button class="btn btn-primary" style="flex:1;min-width:160px" onclick="saveReferat()">&#128190; Lagre referat</button>
        <button class="btn btn-sec" style="min-width:90px" onclick="showList()">Avbryt</button>
      </div>
    </div>

    <div id="view-detail" style="display:none">
      <div id="detail-content"></div>
    </div>

  </div>

  <button class="fab" id="fab" onclick="showNew()">&#65291;</button>

</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBp6DbrNAXRUy8XMno6gIDpcMRwmZi4WdM",
  authDomain:        "husmote.firebaseapp.com",
  projectId:         "husmote",

function getISOWeek(dateStr) {
  const d = new Date((dateStr || today()) + 'T12:00:00');
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const w1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
}

function today() { return new Date().toISOString().split('T')[0]; }

    '<button type="button" class="ag-notes-toggle" onclick="toggleAgNotes(\'' + id + '\')" title="Legg til notater">\ud83d\udcdd Notater</button>' +
    '<button type="button" class="rm-btn" onclick="removeGundem(this)" title="Fjern">\u00d7</button>' +
    '</div>' +
    '<div class="ag-notes-area" id="notes-' + id + '">' +
    '<textarea placeholder="Notater og beslutninger for dette punktet..."></textarea>' +
    '</div>';

  attachDragEvents(div);
  list.appendChild(div);
  renumberGundem();
}

function attachDragEvents(el) {
  el.addEventListener('dragstart', function() {
    draggedGundemEl = el;
    el.classList.add('dragging');
  });

  el.addEventListener('dragend', function() {
    el.classList.remove('dragging');
    document.querySelectorAll('.ag-form-item').forEach(function(item) {
      item.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    draggedGundemEl = null;
    renumberGundem();
  });

  el.addEventListener('dragover', function(e) {
    e.preventDefault();
    if (!draggedGundemEl || draggedGundemEl === el) return;
    const rect = el.getBoundingClientRect();
    const offset = e.clientY - rect.top;
    const isTop = offset < rect.height / 2;
    el.classList.remove('drag-over-top', 'drag-over-bottom');
    el.classList.add(isTop ? 'drag-over-top' : 'drag-over-bottom');
  });

  el.addEventListener('dragleave', function() {
    el.classList.remove('drag-over-top', 'drag-over-bottom');
  });

  el.addEventListener('drop', function(e) {
    e.preventDefault();
    if (!draggedGundemEl || draggedGundemEl === el) return;
    const rect = el.getBoundingClientRect();
    const offset = e.clientY - rect.top;
    const isTop = offset < rect.height / 2;
    el.classList.remove('drag-over-top', 'drag-over-bottom');
    if (isTop) {
      el.parentNode.insertBefore(draggedGundemEl, el);
    } else {
      el.parentNode.insertBefore(draggedGundemEl, el.nextSibling);
    }
    renumberGundem();
  });
}

async function saveReferat() {
  if (!IS_CONFIGURED) return;

  const konu = document.getElementById('f-konu').value.trim();
  if (!konu) {
    document.getElementById('f-konu').focus();
    return;
  }

  const katilimcilar = [...document.querySelectorAll('#f-std-deltakere input:checked, #f-ext-deltakere input:checked')]
    .map(function(c) { return c.value; });

  const gundem = [...document.querySelectorAll('#f-gundem-list .ag-form-item')].map(function(el) {
    return {
      tekst: el.querySelector('input[type=text]').value.trim(),
      notater: el.querySelector('textarea').value.trim()
    };
  }).filter(function(g) { return g.tekst; });

  // ===== ENDRET: Les viderefort-metadata fra data-attributter =====
  const gorevler = [...document.querySelectorAll('#f-gorev-list .task-form-item')].map(function(el) {
    const inputs = el.querySelectorAll('input, select');
    const base = {
      kisi:      inputs[0].value,
      gorev:     inputs[1].value.trim(),
      son_tarih: inputs[2].value,
      status:    inputs[3].value,
      notater:   inputs[4].value.trim()
    };
    if (el.dataset.viderefort === 'true') {
      base.viderefort             = true;
      base.viderefortFraReferatId = el.dataset.viderefortFraReferatId || '';
      base.viderefortFraKonu      = el.dataset.viderefortFraKonu || '';
      base.viderefortFraTarih     = el.dataset.viderefortFraTarih || '';
    }
    return base;
  }).filter(function(g) { return g.gorev; });
  // ================================================================

  const data = {
    konu,
    tarih:            document.getElementById('f-tarih').value,
    olusturan:        document.getElementById('f-olusturan').value,
    katilimcilar,
    gundem,
    gorevler,
    sonraki_toplanti: document.getElementById('f-sonraki').value,
    olusturma_tarihi: firebase.firestore.FieldValue.serverTimestamp(),
    yorumlar: []
  };

  loading(true);
  try {
    const docRef = await db.collection('referatlar').add(data);
    toast('\u2713 Referat lagret!', 'ok');

    // ===== NYTT: Skriv e-poster til mail-koleksjon =====
    try {
      await sendMailQueue(docRef.id, data);
    } catch(mailErr) {
      console.warn('Mail-k\u00f8 feil:', mailErr);
      // Ikke stopp flyten — referatet er allerede lagret
    }
    // ==================================================

    showList();
  } catch(e) {
    toast('Feil: ' + e.message, 'err');
  } finally {
    loading(false);
  }
}

    : '<span style="color:#64748B;">Ingen deltakere</span>';

  return `

// ===== NYTT: Skriv e-poster til Firestore mail-koleksjon =====
async function sendMailQueue(referatId, data) {
  var katilimcilar = data.katilimcilar || [];
  var alleGorevler = data.gorevler || [];

  for (var i = 0; i < katilimcilar.length; i++) {
    var kisi = katilimcilar[i];
    var epost = PERSON_EPOST[kisi];
    if (!epost) continue;

    var mineGorevler = alleGorevler.filter(function(g) { return g.kisi === kisi; });
    var html = buildEmailHtml(data, kisi, mineGorevler, alleGorevler);

    await db.collection('mail').add({
      to:      epost,
      message: {
        subject: 'Familiem\u00f8te referat: ' + data.konu + ' \u2014 ' + fmtDate(data.tarih),
        html:    html
      }
    });
  }
}
// =============================================================

async function loadDetail(id) {
  loading(true);
  try {
    const doc = await db.collection('referatlar').doc(id).get();
    if (!doc.exists) {
      showList();
      return;
    }
    currentReferat = { id: doc.id, ...doc.data() };
    renderDetail(currentReferat);
    document.getElementById('hdr-title').textContent = currentReferat.konu || 'Referat';
  } catch(e) {
    toast('Feil ved lasting', 'err');
    showList();
  } finally {
    loading(false);
  }
}

function renderDetail(r) {
  const el = document.getElementById('detail-content');

  let h =
    '<div class="det-head">' +
    '<div class="det-konu">' + esc(r.konu || '\u2014') + '</div>' +
    '<div class="det-meta">' + fmtDate(r.tarih) +
    (r.olusturan ? ' \u00b7 Opprettet av <strong>' + esc(r.olusturan) + '</strong>' : '') +
    '</div></div>';

  if (r.katilimcilar && r.katilimcilar.length) {
    h += '<div class="det-sec"><div class="det-sec-title">\ud83d\udc65 Deltakere</div>' +
      '<div class="chips">' + r.katilimcilar.map(function(a) { return '<span class="chip">' + esc(a) + '</span>'; }).join('') + '</div></div>';
  }

  const gundem = r.gundem || [];
  const kararlarFallback = r.kararlar || '';

  if (gundem.length) {
    h += '<div class="det-sec"><div class="det-sec-title">\ud83d\udccc Dagsorden</div>';
    gundem.forEach(function(item, i) {
      const tekst = typeof item === 'string' ? item : (item.tekst || '');
      const notater = typeof item === 'string' ? '' : (item.notater || '');
      const notes = notater || (i === gundem.length - 1 ? kararlarFallback : '');
      h += '<div class="acc-item" id="acc-' + r.id + '-' + i + '">' +
        '<button class="acc-trigger" onclick="toggleAcc(\'' + r.id + '\',' + i + ')">' +
        '<span class="acc-num">' + (i + 1) + '</span>' +
        '<span class="acc-label">' + esc(tekst) + '</span>' +
        '<span class="acc-arrow">\u25b6</span>' +
        '</button>' +
        '<div class="acc-body">' +
        (notes ? '<p>' + esc(notes) + '</p>' : '<p class="acc-no-notes">Ingen notater for dette punktet.</p>') +
        '</div></div>';
    });
    h += '</div>';
  }

  const gorevler = r.gorevler || [];
  h += '<div class="det-sec"><div class="det-sec-title">\ud83d\udccb Oppgavefordeling</div>';

  if (gorevler.length) {
    gorevler.forEach(function(g, i) {
      const st = STATUSER[g.status] || STATUSER.ikke_startet;
      // ===== NYTT: Vis viderefort-merke i detaljvisning =====
      const vfMerke = g.viderefort
        ? '<div style="margin-bottom:.3rem"><span style="background:var(--accent-bg);color:#92400E;border-radius:20px;padding:.15rem .5rem;font-size:.72rem;font-weight:700;">\ud83d\udccb Videref\u00f8rt' + (g.viderefortFraKonu ? ' fra: ' + esc(g.viderefortFraKonu) : ' fra forrige referat') + '</span></div>'
        : '';
      // ======================================================
      h += '<div class="task-card' + (g.status === 'avbrutt' ? ' avbrutt' : '') + '">' +
        vfMerke +
        '<div class="task-card-row1">' +
        '<span class="task-who">' + esc(g.kisi) + '</span>' +
        '<span class="task-name">' + esc(g.gorev) + '</span>' +
        '</div>' +
        '<div class="task-card-row2">' +
        '<span class="status-badge ' + st.cls + '">' + st.ikon + ' ' + st.label + '</span>' +
        (g.son_tarih ? '<span class="task-due">\ud83d\udcc5 ' + fmtDate(g.son_tarih) + '</span>' : '') +
        '</div>' +
        (g.notater ? '<div class="task-notes-text">\ud83d\udcac ' + esc(g.notater) + '</div>' : '') +
        '<div class="task-edit-box"><div class="task-edit-row">' +
        '<select id="task-status-' + i + '">' +
        '<option value="ikke_startet"' + (g.status === 'ikke_startet' ? ' selected' : '') + '>\u2b1c Ikke startet</option>' +
        '<option value="pagaar"' + (g.status === 'pagaar' ? ' selected' : '') + '>\ud83d\udd04 P\u00e5g\u00e5r</option>' +
        '<option value="fullfort"' + (g.status === 'fullfort' ? ' selected' : '') + '>\u2705 Fullf\u00f8rt</option>' +
        '<option value="avbrutt"' + (g.status === 'avbrutt' ? ' selected' : '') + '>\u274c Avbrutt</option>' +
        '</select>' +
        '<button class="btn btn-sec btn-sm" onclick="updateTaskStatus(\'' + r.id + '\', ' + i + ')">Lagre status</button>' +
        '</div></div></div>';
    });
  } else {
    h += '<p style="color:var(--muted);font-style:italic;font-size:.875rem">Ingen oppgaver tildelt.</p>';
  }
  h += '</div>';

  if (r.sonraki_toplanti) {
    h += '<div class="next-banner"><span class="ni">\ud83d\udcc5</span><div>' +
      '<div style="font-size:.7rem;color:#92400E;margin-bottom:.05rem">Neste m\u00f8te:</div>' +
      '<div>' + fmtDate(r.sonraki_toplanti) + '</div></div></div>';
  }

  h += '<div style="text-align:right;margin-bottom:1.25rem">' +
    '<button class="btn btn-danger btn-sm" onclick="deleteReferat(\'' + r.id + '\')">\ud83d\uddd1 Slett referat</button></div>';

  const yorumlar = r.yorumlar || [];
  h += '<div class="comments-wrap"><h2>\ud83d\udcac Kommentarer</h2>';

  if (!yorumlar.length) {
    h += '<p style="color:var(--muted);font-style:italic;font-size:.875rem;margin-bottom:.75rem">Ingen kommentarer enn\u00e5.</p>';
  } else {
    yorumlar.forEach(function(y) {
      h += '<div class="com-item"><div class="com-top"><span>\ud83d\udc64</span>' +
        '<span class="com-author">' + esc(y.yazar) + '</span>' +
        '<span class="com-date">' + fmtDT(y.tarih) + '</span></div>' +
        '<p class="com-text">' + esc(y.metin) + '</p></div>';
    });
  }

  const alle = [...STD_DELTAKERE, ...EXT_DELTAKERE];
  h += '<div class="com-form"><label>Legg til kommentar</label>' +
    '<div class="com-row">' +
    '<select id="com-author">' + alle.map(function(m) { return '<option value="' + escAttr(m) + '">' + esc(m) + '</option>'; }).join('') + '</select>' +
    '<textarea id="com-text" placeholder="Skriv din kommentar..."></textarea>' +
    '</div>' +
    '<div style="text-align:right;margin-top:.4rem">' +
    '<button class="btn btn-primary btn-sm" onclick="addComment(\'' + r.id + '\')">Send \u25ba</button>' +
    '</div></div></div>';

  el.innerHTML = h;
}

function toggleAcc(rid, i) {
  const item = document.getElementById('acc-' + rid + '-' + i);
  item.classList.toggle('open');
}

async function updateTaskStatus(referatId, taskIndex) {
  if (!currentReferat || currentReferat.id !== referatId) return;

  const selectEl = document.getElementById('task-status-' + taskIndex);
  if (!selectEl) return;

  const newStatus = selectEl.value;
  const gorevler = Array.isArray(currentReferat.gorevler) ? [...currentReferat.gorevler] : [];
  if (!gorevler[taskIndex]) return;

  gorevler[taskIndex] = {
    ...gorevler[taskIndex],
    status: newStatus
  };

  loading(true);
  try {
    await db.collection('referatlar').doc(referatId).update({ gorevler });
    currentReferat.gorevler = gorevler;
    toast('\u2713 Status oppdatert!', 'ok');
    await loadDetail(referatId);
  } catch (e) {
    toast('Feil ved oppdatering', 'err');
  } finally {
    loading(false);
  }
}

async function addComment(id) {
  const author = document.getElementById('com-author').value;
  const text = document.getElementById('com-text').value.trim();
  if (!text) {
    document.getElementById('com-text').focus();
    return;
  }

  const c = { yazar: author, metin: text, tarih: new Date().toISOString() };
  loading(true);
  try {
    await db.collection('referatlar').doc(id).update({
      yorumlar: firebase.firestore.FieldValue.arrayUnion(c)
    });
    toast('\u2713 Kommentar lagt til!', 'ok');
    loadDetail(id);
  } catch(e) {
    toast('Feil', 'err');
  } finally {
    loading(false);
  }
}

async function deleteReferat(id) {
  if (!confirm('Er du sikker p\u00e5 at du vil slette dette referatet?')) return;
  loading(true);
  try {
    await db.collection('referatlar').doc(id).delete();
    toast('\u2713 Slettet.', 'ok');
    showList();
  } catch(e) {
    toast('Feil', 'err');
  } finally {
    loading(false);
  }
}

function fmtDate(s) {
  if (!s) return '';
  try {
    return new Date(s + 'T12:00:00').toLocaleDateString('nb-NO', {
      day:'numeric', month:'long', year:'numeric'
    });
  } catch(e) {
    return s;
  }
}

function fmtDT(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleDateString('nb-NO', {
      day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'
    });
  } catch(e) {
    return '';
  }
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

let _tTimer;
function toast(msg, type) {
  type = type || '';
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(_tTimer);
  _tTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function loading(on) {
  document.getElementById('loading-overlay').classList.toggle('on', on);
}

function init() {
  if (!IS_CONFIGURED) {
    alert('Firebase er ikke konfigurert enn\u00e5.');
    return;
  }
  if (sessionStorage.getItem('auth') === '1') showApp();
  else showScreen('login-screen');
}

init();
</script>
